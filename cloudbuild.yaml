options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-central2
  _AR_REPO: api
  _API_SERVICE: brevierp-api
  _SEED_JOB: brevierp-seed

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build Host.Api image
    args:
      - build
      - -f
      - src/Bootstrapper/Host.Api/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/host-api:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push Host.Api image
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/host-api:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    id: Build Host.Seed image
    args:
      - build
      - -f
      - src/Bootstrapper/Host.Seed/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/host-seed:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push Host.Seed image
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/host-seed:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy Host.Api to Cloud Run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/host-api:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Create or update Host.Seed Cloud Run Job
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/host-seed:$COMMIT_SHA"
        if gcloud run jobs describe "${_SEED_JOB}" --region "${_REGION}" >/dev/null 2>&1; then
          gcloud run jobs update "${_SEED_JOB}" \
            --image "${IMAGE}" \
            --region "${_REGION}" \
            --max-retries 1 \
            --tasks 1 \
            --parallelism 1 \
            --quiet
        else
          gcloud run jobs create "${_SEED_JOB}" \
            --image "${IMAGE}" \
            --region "${_REGION}" \
            --max-retries 1 \
            --tasks 1 \
            --parallelism 1 \
            --quiet
        fi

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/host-api:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/host-seed:$COMMIT_SHA
